name: CI

# Runs on pull requests only. Pushes to main/beta are handled by the
# Release & Publish workflow, so we avoid running tests twice.
on:
  pull_request:
    branches: [ main, beta ]

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'gradle'
      - run: chmod +x gradlew
      - run: ./gradlew test buildPlugin
